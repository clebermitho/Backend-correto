name: CI/CD Backend

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        node-version: [20]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: chatplay_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Verify application starts
        run: |
          node src/index.js &
          APP_PID=$!
          sleep 5
          kill $APP_PID 2>/dev/null || true
        env:
          NODE_ENV: test
          PORT: 3000
          JWT_SECRET: test-secret-ci
          DATABASE_URL: "postgresql://test:test@localhost:5432/chatplay_test"
